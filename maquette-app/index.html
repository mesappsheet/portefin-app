        <button onclick="event.stopPropagation();openGrandLivreMob('${c.id}')" style="font-size:11px;font-weight:800;color:var(--primary);background:transparent;border:none;cursor:pointer;font-family:inherit">Grand Livre →</button>
      </div>
    </div>`;
  }).join('');
}

async function openNouveauDossierMob(){
  // Charger les crédits sains (sans entrée solde_initial dans recovery_ledger)
  const{data:allCredits}=await sb.from('credits')
    .select('id,client_name,amount,status,clients(full_name)')
    .neq('health','Souffrance').in('status',['En cours','En attente','Échu']);
  if(!allCredits||!allCredits.length){
    openModal(`<div style="padding:20px 20px 28px;text-align:center">
      <span class="material-symbols-outlined" style="font-size:40px;color:var(--text2)">check_circle</span>
      <p style="font-size:15px;font-weight:800;color:var(--text);margin:12px 0 4px">Aucun crédit éligible</p>
      <p style="font-size:13px;color:var(--text2);margin:0 0 20px">Tous les crédits actifs sont déjà en souffrance.</p>
      <button class="btn-ghost" onclick="closeModal()" style="width:100%">Fermer</button>
    </div>`);
    return;
  }
  const options=allCredits.map(c=>{
    const name=c.clients?.full_name||c.client_name||'—';
    const amt=parseInt(c.amount||0).toLocaleString('fr-FR');
    return`<button onclick="closeModal();handleStatusChangeClick('${c.id}','Souffrance','${c.status}')" style="width:100%;text-align:left;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);margin-bottom:8px;cursor:pointer;font-family:inherit">
      <p style="font-size:13px;font-weight:800;color:var(--text);margin:0 0 2px">${name}</p>
      <p style="font-size:11px;color:var(--text2);margin:0">${amt} FCFA · ${c.status}</p>
    </button>`;
  }).join('');
  openModal(`<div style="padding:0 20px 24px">
    <p class="sheet-title" style="padding:0 0 16px;margin-bottom:16px">Nouveau dossier en souffrance</p>
    <p style="font-size:12px;color:var(--text2);margin:0 0 12px">Sélectionnez le crédit à passer en souffrance :</p>
    <div style="max-height:55vh;overflow-y:auto">${options}</div>
    <button class="btn-ghost" onclick="closeModal()" style="width:100%;margin-top:8px">Annuler</button>
  </div>`);
}

async function openGrandLivreMob(creditId){
  window._glMobCreditId=creditId;
  const v=document.getElementById('grand-livre-mob-view');
  v.style.display='flex';
  const content=document.getElementById('grand-livre-mob-content');
  content.innerHTML=`<div style="text-align:center;padding:60px 0;color:var(--text2)">Chargement…</div>`;

  const{data:credit}=await sb.from('credits').select('*,clients(full_name,phone1,phone2,email,address)').eq('id',creditId).single();
  const{data:entries}=await sb.from('recovery_ledger').select('*').eq('credit_id',creditId).order('op_date',{ascending:true});

  if(!credit){content.innerHTML=`<p style="text-align:center;padding:40px;color:var(--text2)">Erreur chargement</p>`;return;}
  const name=credit.clients?.full_name||credit.client_name||'—';
  const phone=credit.clients?.phone1||credit.phone||'';
  const address=credit.clients?.address||credit.address||'';
  const ledger=entries||[];
  const initEntry=ledger.find(e=>e.type==='solde_initial');
  const soldeInit=parseFloat(initEntry?.amount||credit.amount||0);
  const totalV=ledger.filter(e=>e.type==='versement_client'||e.type==='remise').reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const soldeActuel=Math.max(0,soldeInit-totalV);
  const scorePct=soldeInit>0?Math.min(100,Math.round(totalV/soldeInit*100)):0;
  const scoreColor=scorePct>=75?'#22c55e':scorePct>=40?'#f27f0d':'#ef4444';
  const init=(name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase());

  const typeBadges={
    solde_initial:{label:'Solde Initial',color:'#64748b',bg:'rgba(100,116,139,.12)'},
    versement_client:{label:'Versement Client',color:'#22c55e',bg:'rgba(34,197,94,.12)'},
    regularisation:{label:'Régularisation',color:'#f27f0d',bg:'rgba(242,127,13,.12)'},
    remise:{label:'Remise',color:'#3b82f6',bg:'rgba(59,130,246,.12)'},
    frais:{label:'Frais',color:'#ef4444',bg:'rgba(239,68,68,.12)'},
  };

  let runningBalance=0;
  const withBalance=[...ledger].map(e=>{
    if(e.type==='solde_initial')runningBalance=parseFloat(e.amount||0);
    else if(e.type==='versement_client'||e.type==='remise')runningBalance-=parseFloat(e.amount||0);
    else runningBalance+=parseFloat(e.amount||0);
    return{...e,_sp:Math.max(0,runningBalance)};
  }).reverse();

  content.innerHTML=`
    <div style="padding:16px">
      <!-- Fiche client -->
      <div class="glass" style="padding:16px;border-radius:20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="width:48px;height:48px;border-radius:14px;background:rgba(242,127,13,.15);color:var(--primary);font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${init}</div>
          <div><p style="font-size:16px;font-weight:900;color:var(--text);margin:0">${name}</p><p style="font-size:12px;color:var(--primary);font-weight:700;margin:2px 0 0">${credit.activity||'Inconnu'}</p></div>
        </div>
        ${phone?`<p style="font-size:13px;color:var(--text2);margin:4px 0;display:flex;align-items:center;gap:6px"><span class="material-symbols-outlined" style="font-size:16px">call</span>${phone}</p>`:''}
        ${address?`<p style="font-size:13px;color:var(--text2);margin:4px 0;display:flex;align-items:center;gap:6px"><span class="material-symbols-outlined" style="font-size:16px">location_on</span>${address}</p>`:''}
        ${credit.health==='Souffrance'?`<div style="margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);display:flex;align-items:center;gap:8px"><span class="material-symbols-outlined" style="font-size:18px;color:#ef4444">warning</span><div><p style="font-size:11px;font-weight:900;color:#ef4444;text-transform:uppercase;margin:0">Alerte Recouvrement</p><p style="font-size:11px;color:rgba(239,68,68,.7);margin:2px 0 0">Dossier en souffrance</p></div></div>`:''}
        <div style="margin-top:12px">
          <p style="font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Score de risque</p>
          <div style="height:6px;background:var(--border);border-radius:6px;overflow:hidden">
            <div style="height:100%;width:${scorePct}%;background:${scoreColor};border-radius:6px;transition:width .5s"></div>
          </div>
          <p style="font-size:11px;color:var(--text2);margin:4px 0 0">${scorePct}% recouvré</p>
        </div>
      </div>

      <!-- Métriques -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="glass" style="padding:14px;border-radius:16px">
          <p style="font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;margin:0 0 4px">Dette Initiale</p>
          <p style="font-size:15px;font-weight:900;color:var(--text);margin:0">${_fmtMob(soldeInit)}</p>
          <p style="font-size:10px;color:var(--text2);margin:2px 0 0">FCFA</p>
        </div>
        <div class="glass" style="padding:14px;border-radius:16px">
          <p style="font-size:10px;font-weight:800;color:#22c55e;text-transform:uppercase;margin:0 0 4px">Recouvré</p>
          <p style="font-size:15px;font-weight:900;color:#22c55e;margin:0">${_fmtMob(totalV)}</p>
          <p style="font-size:10px;color:var(--text2);margin:2px 0 0">FCFA · ${scorePct}%</p>
        </div>
      </div>
      <div class="glass" style="padding:14px;border-radius:16px;margin-bottom:12px;border:1px solid rgba(239,68,68,.2)">
        <p style="font-size:10px;font-weight:800;color:#ef4444;text-transform:uppercase;margin:0 0 4px">Solde Actuel</p>
        <p style="font-size:22px;font-weight:900;color:#ef4444;margin:0">${_fmtMob(soldeActuel)} <span style="font-size:12px">FCFA</span></p>
        ${soldeActuel>0?`<p style="font-size:10px;font-weight:800;color:#ef4444;text-transform:uppercase;margin:4px 0 0;display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:12px">warning</span>Échéance Dépassée</p>`:`<p style="font-size:10px;font-weight:800;color:#22c55e;text-transform:uppercase;margin:4px 0 0">✓ Soldé</p>`}
      </div>

      <!-- Journal -->
      <div class="glass" style="border-radius:20px;overflow:hidden">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <p style="font-size:13px;font-weight:900;color:var(--text);margin:0">Journal des Opérations</p>
          <button onclick="openEnregistrerOpMob('${creditId}')" style="font-size:11px;font-weight:800;color:var(--primary);background:transparent;border:none;cursor:pointer;font-family:inherit">+ Ajouter</button>
        </div>
        ${withBalance.length?withBalance.map(e=>{
          const badge=typeBadges[e.type]||{label:e.type,color:'#94a3b8',bg:'rgba(148,163,184,.12)'};
          const isDebit=e.type==='versement_client'||e.type==='remise';
          const sign=e.type==='solde_initial'?'':isDebit?'- ':'+ ';
          const amtColor=isDebit?'#22c55e':e.type==='solde_initial'?'var(--text)':'#ef4444';
          return`<div style="padding:12px 16px;border-bottom:1px solid var(--border2)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
              <div>
                <span style="display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:900;background:${badge.bg};color:${badge.color}">${badge.label}</span>
                <p style="font-size:11px;color:var(--text2);margin:4px 0 0">${e.description||'—'}</p>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <p style="font-size:13px;font-weight:900;color:${amtColor};margin:0">${sign}${_fmtMob(e.amount)} FCFA</p>
                <p style="font-size:10px;color:var(--text2);margin:2px 0 0">Solde: ${_fmtMob(e._sp)}</p>
              </div>
            </div>
            <p style="font-size:10px;color:var(--text2);margin:0">${_fmtDMob(e.op_date)}</p>
          </div>`;
        }).join(''):`<div style="padding:32px;text-align:center;color:var(--text2)"><p style="margin:0 0 12px">Aucune opération</p><button onclick="openEnregistrerOpMob('${creditId}')" style="color:var(--primary);font-size:13px;font-weight:800;background:transparent;border:none;cursor:pointer;font-family:inherit">Enregistrer la première opération</button></div>`}
      </div>
    </div>`;
}

function closeGrandLivreMob(){
  const v=document.getElementById('grand-livre-mob-view');
  if(v)v.style.display='none';
}

function openEnregistrerOpMob(creditId){
  if(!creditId)return;
  const today=new Date().toISOString().split('T')[0];
  openModal(`<div style="padding:8px 16px 24px">
    <p style="font-size:17px;font-weight:900;color:var(--text);margin:0 0 4px">Enregistrer une Opération</p>
    <p style="font-size:13px;color:var(--text2);margin:0 0 20px">Saisissez les détails de la nouvelle transaction pour ce client.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <p style="font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Date</p>
        <input type="date" id="mob-op-date" value="${today}" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;outline:none"/>
      </div>
      <div>
        <p style="font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Type</p>
        <select id="mob-op-type" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;box-sizing:border-box;outline:none">
          <option value="versement_client">Versement Client</option>
          <option value="regularisation">Régularisation</option>
          <option value="remise">Remise</option>
          <option value="frais">Frais</option>
          <option value="solde_initial">Solde Initial</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <p style="font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Montant (FCFA)</p>
      <input type="number" id="mob-op-amount" placeholder="0" min="0" step="100" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:15px;font-weight:800;font-family:inherit;box-sizing:border-box;outline:none"/>
    </div>
    <div style="margin-bottom:20px">
      <p style="font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px">Description / Notes</p>
      <textarea id="mob-op-desc" rows="3" placeholder="Précisez l'origine du paiement…" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;resize:none;box-sizing:border-box;outline:none"></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeModal()" style="flex:1;padding:14px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Annuler</button>
      <button onclick="saveOpMob('${creditId}')" style="flex:2;padding:14px;border-radius:14px;border:none;background:var(--primary);color:white;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit">Valider</button>
    </div>
  </div>`);
}

async function saveOpMob(creditId){
  const date=document.getElementById('mob-op-date')?.value;
  const type=document.getElementById('mob-op-type')?.value;
  const amount=parseFloat(document.getElementById('mob-op-amount')?.value||0);
  const description=document.getElementById('mob-op-desc')?.value?.trim();
  if(!date||!type||!amount||amount<=0){toast('Veuillez remplir tous les champs','error');return;}
  const{error}=await sb.from('recovery_ledger').insert({credit_id:creditId,op_date:date,type,amount,description:description||null});
  if(error){toast('Erreur lors de l\'enregistrement','error');return;}
  closeModal();
  toast('Opération enregistrée ✓','ok');
  await openGrandLivreMob(creditId);
  viewRecouvrement(); // Refresh la liste en arrière-plan
}

// ─── FIN MODULE RECOUVREMENT MOBILE ──────────────────────────────────────────

async function viewTasksMobile(){
  const view=document.getElementById('view');
  view.innerHTML=`<div class="loader"><div class="spin"></div></div>`;
  showFab(()=>openTaskFormMobile());
  const{data,error}=await sb.from('tasks').select('*').order('due_date',{ascending:true,nullsFirst:false}).order('created_at',{ascending:false});
  if(error){view.innerHTML=`<div class="empty"><span class="material-symbols-outlined">wifi_off</span><p>Erreur</p></div>`;return;}
  _tasksMobile=data||[];
  renderTasksMobile();
}

function renderTasksMobile(){
  const view=document.getElementById('view');
  const today=new Date().toISOString().split('T')[0];
  const todo=_tasksMobile.filter(t=>t.status==='todo').length;
  const inP=_tasksMobile.filter(t=>t.status==='in_progress').length;
  const done=_tasksMobile.filter(t=>t.status==='done').length;
  const overdue=_tasksMobile.filter(t=>t.due_date&&t.due_date<today&&t.status!=='done').length;
  // Appliquer filtres (sauf statut done — il va dans section séparée)
  const applyFilters=arr=>{
    let r=arr;
    if(_taskPriorityMob)r=r.filter(t=>t.priority===_taskPriorityMob);
    if(_taskSearchMob){const q=_taskSearchMob.toLowerCase();r=r.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.entity_name||'').toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q));}
    return r;
  };
  const allActive=_tasksMobile.filter(t=>t.status!=='done');
  const allDone=_tasksMobile.filter(t=>t.status==='done');
  let activeRows=applyFilters(_taskFilterMob==='done'?[]:(_taskFilterMob==='all'?allActive:allActive.filter(t=>t.status===_taskFilterMob)));
  let doneRows=applyFilters(_taskFilterMob==='todo'||_taskFilterMob==='in_progress'?[]:allDone);
  view.innerHTML=`
    <div style="padding:16px 16px 0">
      <div style="position:relative;margin-bottom:12px">
        <span class="material-symbols-outlined" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text2);pointer-events:none">search</span>
        <input value="${_taskSearchMob}" oninput="_taskSearchMob=this.value;renderTasksMobile()" placeholder="Rechercher une tâche…" style="width:100%;padding:11px 12px 11px 38px;border:1px solid var(--border);border-radius:12px;font-size:14px;background:var(--input-bg);color:var(--text);outline:none;box-sizing:border-box;font-family:inherit"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${[['radio_button_unchecked','À faire',todo,'#64748b'],['sync','En cours',inP,'#3b82f6'],['check_circle','Terminées',done,'#22c55e'],['warning','En retard',overdue,'#ef4444']].map(([ic,lb,v,c])=>`
        <div style="background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px">
          <div style="width:34px;height:34px;border-radius:10px;background:${c}18;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span class="material-symbols-outlined filled" style="font-size:18px;color:${c}">${ic}</span>
          </div>
          <div><p style="font-size:20px;font-weight:900;margin:0;color:var(--text);line-height:1">${v}</p><p style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text2);margin:2px 0 0">${lb}</p></div>
        </div>`).join('')}
      </div>
      <div style="display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px;margin-bottom:10px">
        ${[['all','Toutes'],['todo','À faire'],['in_progress','En cours'],['done','Terminées']].map(([k,l])=>`
        <button onclick="_taskFilterMob='${k}';renderTasksMobile()" style="flex:1;padding:7px 4px;border-radius:9px;border:none;font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;background:${_taskFilterMob===k?'#f27f0d':'transparent'};color:${_taskFilterMob===k?'white':'var(--text2)'};transition:all .15s">${l}</button>`).join('')}
      </div>
      <div style="display:flex;gap:5px;margin-bottom:14px">
        ${[['🔴','urgent','#ef4444'],['🟠','high','#f97316'],['🔵','normal','#3b82f6'],['⚪','low','#94a3b8']].map(([ic,k,c])=>`
        <button onclick="_taskPriorityMob=_taskPriorityMob==='${k}'?null:'${k}';renderTasksMobile()" style="flex:1;padding:6px 4px;border-radius:9px;border:1px solid ${_taskPriorityMob===k?c:'var(--border)'};font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;background:${_taskPriorityMob===k?c+'20':'transparent'};color:${_taskPriorityMob===k?c:'var(--text2)'};transition:all .15s">${ic}</button>`).join('')}
      </div>
    </div>
    <div style="padding:0 16px 6px;display:flex;flex-direction:column;gap:10px">
      ${!activeRows.length&&_taskFilterMob!=='done'?`<div class="empty" style="padding:32px 0"><span class="material-symbols-outlined">task_alt</span><p>Aucune tâche active</p></div>`:activeRows.map(t=>taskCardMobile(t)).join('')}
    </div>
    ${doneRows.length?`
    <div style="padding:0 16px 100px">
      <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.querySelector('.expand-ic').textContent=this.nextElementSibling.style.display==='none'?'expand_more':'expand_less'" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="material-symbols-outlined filled" style="font-size:18px;color:#22c55e">check_circle</span>
          <span style="font-size:12px;font-weight:800;color:#16a34a">Terminées (${doneRows.length})</span>
        </div>
        <span class="material-symbols-outlined expand-ic" style="font-size:20px;color:#94a3b8">expand_more</span>
      </button>
      <div style="display:none;flex-direction:column;gap:8px">
        ${doneRows.map(t=>taskCardMobile(t)).join('')}
      </div>
    </div>`:`<div style="height:100px"></div>`}`;
}

function taskCardMobile(t){
  const p=TASK_P[t.priority]||TASK_P.normal;
  const s=TASK_S[t.status]||TASK_S.todo;
  const subs=Array.isArray(t.subtasks)?t.subtasks:(t.subtasks?JSON.parse(t.subtasks):[]);
  const doneC = t.subtasks_done_count ?? subs.filter(x=>x.done).length;
  const pct = t.progress_percent ?? (subs.length?Math.round(doneC/subs.length*100):(t.status==='done'?100:0));
  const isDone=t.status==='done';
  const today=new Date().toISOString().split('T')[0];
  let dl='',dc='var(--text2)';
  if(t.due_date){
    const diff = t.diff_days ?? Math.round((new Date(t.due_date)-new Date(today))/86400000);
    if(diff<0){dl=`En retard (${Math.abs(diff)}j)`;dc='#ef4444';}
    else if(diff===0){dl=`Aujourd'hui`;dc='#f97316';}
    else if(diff===1){dl=`Demain`;dc='#eab308';}
    else{dl=new Date(t.due_date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
  }
  const isInP=t.status==='in_progress';
  const toggleIcon=isDone?'check':isInP?'sync':'radio_button_unchecked';
  const toggleBg=isDone?'#22c55e':isInP?'#3b82f6':'transparent';
  const toggleBorder=isDone?'#22c55e':isInP?'#3b82f6':p.col;
  const toggleTitle=t.status==='todo'?'→ En cours':t.status==='in_progress'?'→ Terminée':'→ À faire';
  return`<div onclick="openTaskFormMobile('${t.id}')" style="background:var(--card);border-radius:16px;border:1px solid var(--border);border-left:4px solid ${p.col};padding:14px;cursor:pointer;opacity:${isDone?.7:1}">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <button onclick="event.stopPropagation();quickToggleTaskMobile('${t.id}')" title="${toggleTitle}" style="width:28px;height:28px;border-radius:50%;border:2px solid ${toggleBorder};background:${toggleBg};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s">
        <span class="material-symbols-outlined${isDone||isInP?' filled':''}" style="font-size:14px;color:${isDone||isInP?'white':p.col}">${toggleIcon}</span>
      </button>
      <div style="flex:1;min-width:0">
        ${t.entity_name?`<p style="font-size:10px;font-weight:700;color:var(--text2);margin:0 0 3px;display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:12px">person</span>${t.entity_name}</p>`:''}
        <p style="font-size:14px;font-weight:800;margin:0 0 4px;color:var(--text);${isDone?'text-decoration:line-through;color:var(--text2)':''}">${t.title||'—'}</p>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:${subs.length?'8px':'0'}">
          <span style="padding:2px 8px;border-radius:20px;background:${p.bg};color:${p.col};font-size:9px;font-weight:800;text-transform:uppercase">${p.label}</span>
          <span style="padding:2px 8px;border-radius:20px;background:${s.bg};color:${s.col};font-size:9px;font-weight:800;text-transform:uppercase">${s.label}</span>
          ${t.due_date?`<span style="padding:2px 8px;border-radius:20px;background:${dc}18;color:${dc};font-size:9px;font-weight:800">📅 ${dl}${t.due_time?' '+t.due_time.slice(0,5):''}</span>`:''}
        </div>
        ${subs.length?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="height:3px;flex:1;background:var(--border);border-radius:10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${p.col};border-radius:10px;transition:width .3s"></div></div><span style="font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap">${doneC}/${subs.length}</span></div>

async function saveTaskMobile(){
  const title=(document.getElementById('tmob-title')?.value||'').trim();
  if(!title){toast('Saisir un titre pour la tâche','err');document.getElementById('tmob-title')?.focus();return;}
  const payload={
    title,
    entity_name:(document.getElementById('tmob-entity')?.value||'').trim()||null,
    entity_id:document.getElementById('tmob-entity-id')?.value||null,
    entity_type:document.getElementById('tmob-entity-type')?.value||'free',
    due_date:document.getElementById('tmob-date')?.value||null,
    due_time:document.getElementById('tmob-time')?.value||null,
    priority:document.getElementById('tmob-priority')?.value||'normal',
    status:_taskFormStatusMob,
    subtasks:_taskSubtasksFormMob,
    notes:(document.getElementById('tmob-notes')?.value||'').trim()||null,
    updated_at:new Date().toISOString()
  };
  let error;
  if(_editingTaskIdMob){({error}=await sb.from('tasks').update(payload).eq('id',_editingTaskIdMob));}
  else{({error}=await sb.from('tasks').insert([{...payload,created_at:new Date().toISOString()}]));}
  if(error){toast('Erreur : '+error.message,'err');return;}
  closeTaskForm();
  toast(_editingTaskIdMob?'Tâche modifiée ✓':'Tâche créée ✓','ok');
  viewTasksMobile();
}

async function deleteTaskMobile(){
  if(!_editingTaskIdMob)return;
  if(!confirm('Supprimer cette tâche définitivement ?'))return;
  const{error}=await sb.from('tasks').delete().eq('id',_editingTaskIdMob);
  if(error){toast('Erreur','err');return;}
  closeTaskForm();
  toast('Tâche supprimée','ok');
  viewTasksMobile();
}

function closeTaskForm(){
  document.getElementById('task-form-view').style.display='none';
  document.body.style.overflow='';
}

async function quickToggleTaskMobile(taskId){
  const t=_tasksMobile.find(x=>x.id===taskId);
  if(!t)return;
  const cycle={todo:'in_progress',in_progress:'done',done:'todo'};
  const ns=cycle[t.status]||'in_progress';
  const{error}=await sb.from('tasks').update({status:ns,updated_at:new Date().toISOString()}).eq('id',taskId);
  if(!error){t.status=ns;renderTasksMobile();}
}

function exportTaskToGCalMobile(taskId){
  const t=_tasksMobile.find(x=>x.id===taskId);
  if(!t)return;
  const subs=Array.isArray(t.subtasks)?t.subtasks:(t.subtasks?JSON.parse(t.subtasks):[]);
  const details=subs.map(s=>(s.done?'✓ ':'○ ')+s.text).join('\n')+(t.notes?'\n\n'+t.notes:'');
  const dateStr=(t.due_date||new Date().toISOString().split('T')[0]).replace(/-/g,'');
  let dates=dateStr+'/'+dateStr;
  if(t.due_time){
    const startH=t.due_time.split(':').slice(0,2).join('')+'00';
    const start=dateStr+'T'+startH;
    const endD=new Date(t.due_date+'T'+t.due_time);
    endD.setHours(endD.getHours()+1);
    const endStr=endD.toISOString().split('T')[0].replace(/-/g,'')+'T'+endD.toISOString().split('T')[1].replace(/[:.]/g,'').slice(0,6);
    dates=start+'/'+endStr;
  }
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(t.title||'Tâche')}&dates=${dates}&details=${encodeURIComponent(details)}&sf=true&output=xml`,'_blank');
}

let _taskMobEntityTimeout=null;
async function searchTaskEntityMob(q){
  const res=document.getElementById('tmob-entity-res');
  clearTimeout(_taskMobEntityTimeout);
  if(!q||q.length<2){res.style.display='none';return;}
  _taskMobEntityTimeout=setTimeout(async()=>{
    const[{data:clients},{data:prospects}]=await Promise.all([
      sb.from('clients').select('id,full_name').ilike('full_name',`%${q}%`).limit(5),
      sb.from('prospects').select('id,full_name').ilike('full_name',`%${q}%`).limit(5)
    ]);
    const all=[...(clients||[]).map(c=>({...c,_type:'client'})),...(prospects||[]).map(p=>({...p,_type:'prospect'}))];
    if(!all.length){res.innerHTML=`<p style="padding:12px;font-size:13px;color:var(--text2);text-align:center">Aucun résultat</p>`;res.style.display='block';return;}
    res.innerHTML=all.map(e=>`<div onclick="selectTaskEntityMob('${e.id}','${(e.full_name||'').replace(/'/g,"\\'")}','${e._type}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <span class="material-symbols-outlined" style="font-size:15px;color:${e._type==='client'?'#f27f0d':'#6366f1'}">${e._type==='client'?'person':'person_search'}</span>
      <div><p style="font-size:13px;font-weight:700;margin:0;color:var(--text)">${e.full_name}</p><p style="font-size:9px;color:var(--text2);margin:0;text-transform:uppercase;font-weight:600">${e._type}</p></div>
    </div>`).join('');
    res.style.display='block';
  },250);
}

function selectTaskEntityMob(id,name,type){
  document.getElementById('tmob-entity').value=name;
  document.getElementById('tmob-entity-id').value=id;
  document.getElementById('tmob-entity-type').value=type;

function openTaskForEntityMobile(id,name,type){

  if(active){

    await sb.from('communication_models')
      .update({ active: false })
      .eq('category', category)
      .ilike('type', isWA ? 'WhatsApp%' : 'SMS%')
      .neq('id', id);
  }
  const{error}=await sb.from('communication_models').update({active}).eq('id',id);
  if(error){toast('Erreur de mise à jour','err');viewModels();}
  else {
    toast(`"${title}" — ${active?'activé ✓':'désactivé'}`, active?'ok':'info');
    viewModels();
  }
}

function insertBalise(taId,b){
  const ta=document.getElementById(taId);
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.substring(0,s)+b+ta.value.substring(e);
  ta.selectionStart=ta.selectionEnd=s+b.length;
  ta.focus();
}

async function saveModel(id,isNew){
  const title=(document.getElementById('m-title').value||'').trim();
  const type=document.getElementById('m-type').value;
  const category=document.getElementById('m-cat').value;
  const body=(document.getElementById('m-body').value||'').trim();
  if(!title){toast('Titre requis','err');return;}
  if(!body){toast('Message requis','err');return;}
  const payload={title,type,category,body};
  let error;
  if(isNew){
    payload.active=false;
    ({error}=await sb.from('communication_models').insert(payload));
  }else{
    ({error}=await sb.from('communication_models').update(payload).eq('id',id));
  }
  if(error){toast('Erreur sauvegarde','err');return;}
  toast(isNew?'Modèle créé ✓':'Modèle mis à jour ✓','ok');
  closeModal();
  viewModels();
}

async function openCreditDetail(id) {
  if(!id){ toast('Crédit introuvable', 'err'); return; }
  let c = _credCache[id];
  if(!c){
    // Pas dans le cache (ex: ouvert depuis Remboursements) → fetch Supabase
    const{data,error}=await sb.from('credits')
      .select('id,client_id,amount,status,type,client_name,phone,email,activity,address,health,start_date,end_date,clients(id,full_name,phone1,phone2,email,activity,address)')
      .eq('id',id).single();
    if(error||!data){ toast('Crédit introuvable', 'err'); return; }
    // Compter les remboursements
    const{data:repsAll}=await sb.from('repayments').select('is_paid').eq('credit_id',id);
    const paid=(repsAll||[]).filter(r=>r.is_paid).length;
    data.reps={total:(repsAll||[]).length,paid};
    _credCache[id]=data;
    c=data;
  }
  currentCreditId = id;
  const content = document.getElementById('credit-detail-content');
  content.innerHTML = renderCreditDetail(c);
  document.getElementById('credit-detail-view').classList.add('open');
}

  openConfirm('Se déconnecter ?','Vous serez redirigé vers la page de connexion.',async()=>{

    await sb.auth.signOut().catch(()=>{});
    window.location.replace('/mobile/login');
  });
}

// Service Worker
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
