<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>PorteFin Mobile</title>
<meta name="theme-color" content="#0c1425"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="./manifest.json"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;transition:background .3s,color .3s}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none}
.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

/* ── Variables thème ── */
:root{
  --bg:#0c1425;--bg2:#0a1020;--text:white;--text2:rgba(255,255,255,.45);--text3:rgba(255,255,255,.25);
  --card:rgba(255,255,255,.05);--card2:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.07);
  --bar-bg:rgba(10,16,30,.97);--bar-border:rgba(255,255,255,.08);
  --top-bg:rgba(12,20,37,.95);--top-border:rgba(255,255,255,.07);
  --input-bg:rgba(255,255,255,.07);--input-border:rgba(255,255,255,.1);
  --sheet-bg:#111f3a;--confirm-bg:#1a2a48;
  --ghost-bg:rgba(255,255,255,.07);--ghost-border:rgba(255,255,255,.1);
  --ghost-hover:rgba(255,255,255,.12);
  --nav-icon:rgba(255,255,255,.35);--nav-text:rgba(255,255,255,.3);
  --sep:rgba(255,255,255,.05);--close-bg:rgba(255,255,255,.08);
}
body.light{
  --bg:#f0f4f8;--bg2:#e8edf3;--text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --card:rgba(255,255,255,.85);--card2:rgba(255,255,255,.7);
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.06);
  --bar-bg:rgba(255,255,255,.97);--bar-border:rgba(0,0,0,.08);
  --top-bg:rgba(240,244,248,.97);--top-border:rgba(0,0,0,.07);
  --input-bg:rgba(255,255,255,.9);--input-border:rgba(0,0,0,.12);
  --sheet-bg:#ffffff;--confirm-bg:#ffffff;
  --ghost-bg:rgba(0,0,0,.05);--ghost-border:rgba(0,0,0,.1);
  --ghost-hover:rgba(0,0,0,.08);
  --nav-icon:rgba(0,0,0,.3);--nav-text:rgba(0,0,0,.35);
  --sep:rgba(0,0,0,.06);--close-bg:rgba(0,0,0,.06);
}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:relative}
#topbar{flex-shrink:0;padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--top-bg);border-bottom:1px solid var(--top-border);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;z-index:50}
#view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);position:relative}
#bottomnav{flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);background:var(--bar-bg);border-top:1px solid var(--bar-border);backdrop-filter:blur(16px);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;transition:all .2s;gap:3px;min-height:56px}
.nav-item .ni{font-size:22px;color:var(--nav-icon);transition:all .2s}
.nav-item .nl{font-size:10px;font-weight:600;color:var(--nav-text);transition:all .2s;letter-spacing:.02em}
.nav-item.active .ni{color:#f27f0d}
.nav-item.active .nl{color:#f27f0d}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#f27f0d;opacity:0;transition:all .2s;margin-top:2px}
.nav-item.active .nav-dot{opacity:1}

/* Fond décoratif */
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-a{width:300px;height:300px;background:radial-gradient(circle,rgba(242,127,13,.12),transparent 70%);top:-60px;right:-60px}
.orb-b{width:250px;height:250px;background:radial-gradient(circle,rgba(23,99,207,.1),transparent 70%);bottom:80px;left:-60px}
body.light .orb-a{background:radial-gradient(circle,rgba(242,127,13,.07),transparent 70%)}
body.light .orb-b{background:radial-gradient(circle,rgba(23,99,207,.06),transparent 70%)}

/* Cards glass */
.glass{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px}
.glass-sm{background:var(--card2);border:1px solid var(--border2);border-radius:12px}

/* Stat cards */
.stat-card{padding:16px;display:flex;flex-direction:column;gap:4px}
.stat-val{font-size:22px;font-weight:800;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-green{background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.25)}
body:not(.light) .badge-green{color:#4ade80}
.badge-red{background:rgba(239,68,68,.15);color:#dc2626;border:1px solid rgba(239,68,68,.25)}
body:not(.light) .badge-red{color:#f87171}
.badge-orange{background:rgba(242,127,13,.15);color:#ea580c;border:1px solid rgba(242,127,13,.25)}
body:not(.light) .badge-orange{color:#fb923c}
.badge-blue{background:rgba(99,102,241,.15);color:#4f46e5;border:1px solid rgba(99,102,241,.25)}
body:not(.light) .badge-blue{color:#818cf8}
.badge-gray{background:var(--card);color:var(--text2);border:1px solid var(--border)}

/* Boutons action */
.btn-primary{padding:12px 20px;background:linear-gradient(135deg,#f27f0d,#c96a00);border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;box-shadow:0 4px 15px rgba(242,127,13,.3)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{padding:10px 16px;background:var(--ghost-bg);border:1px solid var(--ghost-border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.btn-ghost:active{background:var(--ghost-hover)}

/* Repayment item */
.rep-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:12px;transition:background .15s}
.rep-item:active{background:rgba(255,255,255,.04)}
.rep-item:last-child{border-bottom:none}
.rep-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(242,127,13,.2),rgba(242,127,13,.1));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:800;color:#f27f0d;text-transform:uppercase}

/* Toggle payé */
.toggle-paid{padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.toggle-paid.paid{background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.3)}
body:not(.light) .toggle-paid.paid{color:#4ade80}
.toggle-paid.pending{background:rgba(242,127,13,.12);color:#ea580c;border:1px solid rgba(242,127,13,.25)}
body:not(.light) .toggle-paid.pending{color:#fb923c}
.toggle-paid:active{transform:scale(.95)}

/* Action buttons */
.action-btn{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:18px;flex-shrink:0}
.action-btn:active{transform:scale(.92)}
.ab-wa{background:rgba(37,211,102,.15);color:#25D366}
.ab-call{background:rgba(99,102,241,.15);color:#6366f1}
body:not(.light) .ab-call{color:#818cf8}
.ab-edit{background:var(--close-bg);color:var(--text2)}
.ab-del{background:rgba(239,68,68,.12);color:#dc2626}
body:not(.light) .ab-del{color:#f87171}

/* Items */
.rep-item{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:12px;transition:background .15s}
.rep-item:active{background:var(--card2)}
.rep-item:last-child{border-bottom:none}
.rep-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(242,127,13,.2),rgba(242,127,13,.1));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:800;color:#f27f0d;text-transform:uppercase}
.pros-item{padding:14px 16px;border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:12px}
.pros-item:last-child{border-bottom:none}
.pros-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(99,102,241,.15));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;font-weight:800;color:#6366f1;text-transform:uppercase}
body:not(.light) .pros-avatar{color:#818cf8}
.cred-item{padding:14px 16px;border-bottom:1px solid var(--sep)}
.cred-item:last-child{border-bottom:none}
.progress-bar-bg{height:5px;background:var(--close-bg);border-radius:10px;overflow:hidden;margin-top:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#f27f0d,#c96a00);border-radius:10px;transition:width .5s ease}

/* FAB */
.fab{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom) + 12px);right:16px;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#f27f0d,#c96a00);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(242,127,13,.5);z-index:100;transition:all .2s;color:white}
.fab:active{transform:scale(.93)}

/* Input mobile */
.m-input{width:100%;padding:12px 14px;background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none;appearance:none}
.m-input::placeholder{color:var(--text3)}
.m-input:focus{border-color:#f27f0d;box-shadow:0 0 0 3px rgba(242,127,13,.12)}
.m-select{background-color:var(--input-bg);color:var(--text)}
.m-select option{background:var(--sheet-bg);color:var(--text)}

/* Tabs */
.tab-bar{display:flex;gap:8px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab-btn.active{background:#f27f0d;border-color:#f27f0d;color:white}

/* Search bar */
.search-wrap{position:relative;margin:0 16px 12px}
.search-wrap .material-symbols-outlined{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.search-inp{width:100%;padding:10px 12px 10px 38px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;appearance:none}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:rgba(242,127,13,.5)}

/* Modal Popup */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
#modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#modal-sheet{background:var(--sheet-bg);border:1px solid rgba(255,255,255,.1);box-shadow:0 15px 40px rgba(0,0,0,.5);border-radius:24px;width:92%;max-width:500px;max-height:90vh;overflow-y:auto;padding:0 0 10px;animation:popIn .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative}
body.light #modal-sheet{border:1px solid rgba(0,0,0,.15);box-shadow:0 15px 40px rgba(0,0,0,.25)}
@keyframes popIn{from{transform:scale(0.95) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.sheet-handle-row{display:flex;align-items:center;justify-content:flex-end;padding:12px 16px 0;position:sticky;top:0;background:var(--sheet-bg);z-index:10;border-radius:24px 24px 0 0}
.sheet-handle{display:none}
.sheet-close{width:36px;height:36px;border-radius:50%;background:var(--close-bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .2s;flex-shrink:0}
.sheet-close:active{background:var(--ghost-hover);transform:scale(.95)}
.sheet-title{font-size:17px;font-weight:700;color:var(--text);padding:12px 20px 14px;border-bottom:1px solid var(--sep)}

/* Context menu */
.ctx-menu{position:fixed;z-index:500;background:var(--sheet-bg);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:6px;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:ctxIn .15s ease}
@keyframes ctxIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:background .15s}
.ctx-item:active{background:rgba(255,255,255,.07)}
.ctx-item.ctx-danger{color:#f87171}
.ctx-item.ctx-danger:active{background:rgba(239,68,68,.1)}
.ctx-sep{height:1px;background:var(--sep);margin:4px 0}

/* Toast */
#toast{position:fixed;top:calc(20px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-10px);z-index:999;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;color:white;min-width:240px;max-width:90vw;transition:all .3s;opacity:0;pointer-events:none;backdrop-filter:blur(16px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:rgba(239,68,68,.9);border:1px solid rgba(239,68,68,.5)}
#toast.ok{background:rgba(34,197,94,.9);border:1px solid rgba(34,197,94,.5)}
#toast.info{background:rgba(99,102,241,.9);border:1px solid rgba(99,102,241,.5)}

/* Loader */
.loader{display:flex;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text2);font-size:14px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:#f27f0d;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .material-symbols-outlined{font-size:48px;display:block;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;margin:0}

/* Confirm dialog */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#confirm-overlay.open{display:flex}
#confirm-box{background:var(--confirm-bg);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px}

/* Section header */
.section-h{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.section-h h2{font-size:15px;font-weight:700;margin:0;color:white}
.section-h span{font-size:12px;color:rgba(255,255,255,.4)}

/* Prospect Detail View (Mobile Fullscreen) */
/* Detail Views (Mobile Fullscreen) */
#prospect-detail-view, #credit-detail-view {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: none;
  flex-direction: column;
  animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
#prospect-detail-view.open, #credit-detail-view.open { display: flex; }
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}

.detail-header {
  flex-shrink: 0;
  padding: 12px 16px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: var(--top-bg);
  border-bottom: 1px solid var(--top-border);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 100px;
  -webkit-overflow-scrolling: touch;
}
.detail-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
}
.detail-label {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .06em;
  font-weight: 600;
  margin-bottom: 4px;
}
.detail-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.detail-action-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.detail-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  color: var(--text);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  transition: all .2s;
}
.detail-action-btn:active { background: var(--ghost-hover); transform: scale(0.96); }
.detail-status-badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="bg-orb orb-a"></div>
<div class="bg-orb orb-b"></div>

<!-- Toast -->
<div id="toast"><span id="t-icon" class="material-symbols-outlined filled" style="font-size:18px"></span><span id="t-msg"></span></div>

<!-- Confirm dialog -->
<div id="confirm-overlay">
  <div id="confirm-box" style="background:var(--confirm-bg);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px">
    <p id="confirm-msg" style="color:var(--text);font-weight:600;font-size:15px;margin:0 0 6px"></p>
    <p id="confirm-sub" style="color:var(--text2);font-size:13px;margin:0 0 20px"></p>
    <div style="display:flex;gap:10px">
      <button onclick="closeConfirm()" class="btn-ghost" style="flex:1;padding:11px">Annuler</button>
      <button id="confirm-ok" style="flex:1;padding:11px;background:rgba(239,68,68,.85);border:1px solid rgba(239,68,68,.4);border-radius:10px;color:white;font-weight:700;font-size:14px;font-family:Inter,sans-serif;cursor:pointer">Supprimer</button>
    </div>
  </div>
</div>

<!-- Modal bottom sheet -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal();">
  <div id="modal-sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle-row">
      <div class="sheet-handle"></div>
      <button class="sheet-close" onclick="closeModal()">
        <span class="material-symbols-outlined" style="font-size:18px">close</span>
      </button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Prospect Detail (Fullscreen) -->
<div id="prospect-detail-view">
  <div class="detail-header">
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="closeProspectDetail()" style="width:36px;height:36px;border-radius:50%;background:var(--close-bg);border:none;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <p style="font-size:17px;font-weight:800;margin:0;color:var(--text)">Détails Prospect</p>
    </div>
    <button id="detail-more-btn" class="action-btn" style="background:var(--close-bg);border:none" onclick="openDetailMenu(this)">
      <span class="material-symbols-outlined">more_horiz</span>
    </button>
  </div>
  <div id="prospect-detail-content" class="detail-content"></div>
</div>

<!-- Credit Detail (Fullscreen) -->
<div id="credit-detail-view">
  <div class="detail-header">
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="closeCreditDetail()" style="width:36px;height:36px;border-radius:50%;background:var(--close-bg);border:none;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>

// ─── CONTEXT MENU ─────────────────────────────
function showMenu(btn,items){
  closeCtxMenu();
  const rect=btn.getBoundingClientRect();
  const menu=document.createElement('div');
  menu.className='ctx-menu';menu.id='ctx-menu';
  items.forEach((item,i)=>{
    if(item.sep){const s=document.createElement('div');s.className='ctx-sep';menu.appendChild(s);return;}
    const el=document.createElement('button');
    el.className='ctx-item'+(item.danger?' ctx-danger':'');
    el.innerHTML=`<span class="material-symbols-outlined filled" style="font-size:18px">${item.icon}</span>${item.label}`;
    el.ontouchend=el.onclick=(e)=>{e.stopPropagation();closeCtxMenu();item.fn();};
    menu.appendChild(el);
  });
  document.body.appendChild(menu);
  const menuH=menu.childElementCount*44+12;
  let top=rect.bottom+6;
  if(top+menuH>window.innerHeight-20)top=rect.top-menuH-6;
  let left=rect.right-menu.offsetWidth||rect.right-200;
  if(left<8)left=8;
  if(left+200>window.innerWidth-8)left=window.innerWidth-208;
  menu.style.top=Math.max(8,top)+'px';
  menu.style.left=Math.max(8,left)+'px';
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true,capture:true}),100);
}

// ─── HELPERS ──────────────────────────────────
function fmt(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('fr-FR');}
function fmtDate(d){if(!d)return'—';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function initials(name){if(!name)return'?';return name.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function getPhone(r){return r?.clients?.phone1||r?.phone||r?.phone1||'';}

async function wa(phone, name='', category='Crédit', amount=0, date='', activity='', id=''){
  const p=(phone||'').replace(/\D/g,'');
  if(!p){toast('Numéro introuvable','err');return;}

  let template=null;
  try{
    // 1. Essai catégorie spécifique active
    let{data:tpl}=await sb.from('communication_models')
      .select('title,body,category')
      .eq('active',true)
      .ilike('type','WhatsApp%')
      .eq('category',category)
      .limit(1);
    
    // 2. Fallback intelligent (Prospection ou Crédit) si vide
    if(!tpl||!tpl.length){
      const fallback=category.includes('rosp')?'Prospection':'Crédit';
      const res=await sb.from('communication_models')
        .select('title,body,category')
        .eq('active',true)
        .ilike('type','WhatsApp%')
        .eq('category',fallback)
        .limit(1);
      tpl=res.data;
    }
    template=tpl&&tpl[0]||null;
  }catch(e){console.error("WA Template Error:",e);}

  if(!template || !template.body){
    toast(`Aucun modèle actif pour "${category}"`,'err');
    template = { body: `Bonjour ${name},`, title: 'Par défaut', category: 'Système' };
  }

  const formattedAmount=amount?new Intl.NumberFormat('fr-FR').format(amount):'';
  const fmtDate_=date?fmtDate(date):'';
  
  const replaceMap = {
    "{{Nom du Client}}": name,
    "{{Nom du Prospect}}": name,
    "{{Nom}}": name,
    "{{Capital}}": formattedAmount,
    "{{Montant}}": formattedAmount,
    "{{Montant à Payer}}": formattedAmount,
    "{{Date}}": fmtDate_,
    "{{Date d'Échéance}}": fmtDate_,
    "{{Activité}}": activity || '',
    "{{ID}}": id ? id.substring(0,8) : '',
    "{{Id_Dossier}}": id ? id.substring(0,8) : ''
  };

  let msgBody = template.body;
  Object.keys(replaceMap).forEach(tag => {
    msgBody = msgBody.split(tag).join(replaceMap[tag]);
  });

  openModal(`
    <div style="padding:0 20px 24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--sep)">
        <div style="width:38px;height:38px;border-radius:10px;background:rgba(37,211,102,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span class="material-symbols-outlined filled" style="color:#25d366;font-size:20px">chat</span>
        </div>
        <div>
          <p style="font-size:10px;color:#25d366;font-weight:700;text-transform:uppercase;letter-spacing:.15em;margin:0">WhatsApp</p>
          <p style="font-size:15px;font-weight:700;color:var(--text);margin:0">${name}</p>
        </div>
      </div>
      <p style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px">Modèle : <strong>${template.title}</strong> (${template.category})</p>
      <textarea id="wa-msg-preview" class="m-input" rows="7" style="resize:none;font-size:13px;line-height:1.6">${msgBody}</textarea>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn-ghost" onclick="closeModal()" style="flex:1">Annuler</button>
        <button onclick="sendWaFinal('${p}','wa-msg-preview')" class="btn-primary" style="flex:2;background:linear-gradient(135deg,#25d366,#128c7e);box-shadow:0 4px 15px rgba(37,211,102,.3)">
          <span class="material-symbols-outlined filled" style="font-size:18px">send</span> Envoyer via WhatsApp
        </button>
      </div>
    </div>`);
}

function sendWaFinal(phone, textareaId){
  const msg=(document.getElementById(textareaId).value||'').trim();
  if(!msg){toast('Message vide','err');return;}
  closeModal();
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}
function call(phone){
  const p=(phone||'').replace(/[\s\-]/g,'');
  if(!p){toast('Numéro introuvable','err');return;}
  window.location.href=`tel:${p}`;
}

async function quickToggle(id,isPaid,btn){
  btn.disabled=true;
  try{
    const newPaid=!isPaid;
    const{error}=await sb.from('repayments').update({
      is_paid:newPaid,
      actual_payment_date:newPaid?today():null
    }).eq('id',id);
    if(error)throw error;
    if(newPaid){
      btn.className='toggle-paid paid';
      btn.innerHTML='<span class="material-symbols-outlined" style="font-size:13px">check_circle</span> Payé';
      btn.onclick=()=>quickToggle(id,true,btn);
    }else{
      btn.className='toggle-paid pending';
      btn.innerHTML='<span class="material-symbols-outlined" style="font-size:13px">radio_button_unchecked</span> En attente';
      btn.onclick=()=>quickToggle(id,false,btn);
    }
    toast(newPaid?'Marqué payé ✓':'Remis en attente','ok');
  }catch(e){
    toast('Erreur de mise à jour','err');
  }finally{btn.disabled=false;}
}

function shiftDate(n){
  const d=new Date(repDate+'T12:00:00');
  d.setDate(d.getDate()+n);
  repDate=d.toISOString().split('T')[0];
  document.getElementById('rep-date-inp').value=repDate;
  loadRepayments();
}
function setRepFilter(f){
  repFilter=f;

async function loadRepayments(){
  const list=document.getElementById('rep-list');
  if(!list)return;
  list.innerHTML=`<div class="loader"><div class="spin"></div></div>`;
  try{
    let q=sb.from('repayments')
      .select('id,scheduled_date,amount,is_paid,is_reported,credits(id,client_name,phone,health,status,clients(full_name,phone1))')
      .eq('scheduled_date',repDate)
      .order('is_paid',{ascending:true});
    if(repFilter==='pending')q=q.eq('is_paid',false);
    if(repFilter==='paid')q=q.eq('is_paid',true);
    const{data,error}=await q;
    if(error)throw error;
    const rows=data||[];
    if(!rows.length){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">event_busy</span><p>Aucun remboursement pour cette date</p></div>`;return;}
    const paid=rows.filter(r=>r.is_paid).length;
    const pending=rows.length-paid;
    const pct=rows.length?Math.round(paid/rows.length*100):0;
    const totalAmt=rows.reduce((s,r)=>s+(r.amount||0),0);
    const paidAmt=rows.filter(r=>r.is_paid).reduce((s,r)=>s+(r.amount||0),0);
    list.innerHTML=`
      <!-- Barre de progression -->
      <div style="margin:0 16px 14px;background:var(--card);border-radius:14px;padding:14px 16px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

            <span style="font-size:13px;color:var(--text2);font-weight:500"> / ${rows.length} encaissés</span>
          </div>
          <span style="font-size:13px;font-weight:800;color:${pct===100?'#4ade80':'#f27f0d'}">${pct}%</span>
        </div>
        <div style="height:8px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pct===100?'linear-gradient(90deg,#4ade80,#22c55e)':'linear-gradient(90deg,#f27f0d,#c96a00)'};border-radius:10px;transition:width .6s ease"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <span style="font-size:10px;color:#4ade80;font-weight:700">${paid} encaissé${paid>1?'s':''} · ${fmt(paidAmt)} FCFA</span>

      </div>

        ${rows.map(r=>repRow(r)).join('')}
      </div>`;
  }catch(e){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">wifi_off</span><p>Erreur</p></div>`;}
}

async function loadCredits(){
  const list=document.getElementById('cred-list');
  if(!list)return;
  list.innerHTML=`<div class="loader"><div class="spin"></div></div>`;
  try{
    let q=sb.from('credits')
      .select('id,client_id,amount,status,type,client_name,phone,email,activity,address,health,start_date,end_date,clients(id,full_name,phone1,phone2,email,activity,address)')
      .order('status', { ascending: true })
      .order('health', { ascending: false })
      .order('created_at', { ascending: false });
    if(credFilter==='solde'){
      q=q.in('status',['Soldé','SOLDÉ','soldé']);
    } else {
      q=q.not('status','in','("Soldé","SOLDÉ","soldé")');
      if(credFilter==='encours')q=q.in('status',['En cours','en cours','ENCOURS']);
      if(credFilter==='souffrance')q=q.eq('health','Souffrance');
    }
    const{data,error}=await q;
    if(error)throw error;
    let rows=data||[];
    if(credSearch){
      const s=credSearch.toLowerCase();
      rows=rows.filter(c=>(getName(c)).toLowerCase().includes(s));
    }
    if(!rows.length){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">account_balance</span><p>Aucun crédit trouvé</p></div>`;return;}

    // Pour chaque crédit, compter les remboursements
    const ids=rows.map(c=>c.id);
    const{data:repsAll}=await sb.from('repayments').select('credit_id,is_paid').in('credit_id',ids);
    const repsMap={};
    (repsAll||[]).forEach(r=>{
      if(!repsMap[r.credit_id])repsMap[r.credit_id]={total:0,paid:0};
      repsMap[r.credit_id].total++;
      if(r.is_paid)repsMap[r.credit_id].paid++;
    });

    rows.forEach(c=>{
      c.reps=repsMap[c.id]||{total:0,paid:0};
      _credCache[c.id]=c;
    });

    list.innerHTML=`
      <div style="padding:0 16px 8px">
        <span style="font-size:12px;color:rgba(255,255,255,.4)">${rows.length} dossier${rows.length>1?'s':''}</span>
      </div>
      <div class="glass" style="margin:0 16px;overflow:hidden">
        ${rows.map(c=>credRow(c)).join('')}
      </div>`;
  }catch(e){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">wifi_off</span><p>Erreur</p></div>`;}
}

          <!-- Badge STATUT — ▾ Menu modal -->
          ${(() => {

            return `<span class="badge ${bClass}" style="font-size:9px;padding:3px 8px;cursor:pointer;display:flex;align-items:center;gap:3px" onclick="event.stopPropagation();changeCreditStatus('${c.id}','${name.replace(/'/g,"\\'")}','${st}')">
              ${st} <span style="font-size:10px;opacity:.7">▾</span>

function skipWeekendLocal(d){
  const day=d.getDay();
  if(day===6)d.setDate(d.getDate()+2);
  else if(day===0)d.setDate(d.getDate()+1);
  return d;
}

async function saveCredit(){
  const name=(document.getElementById('credit-name').value||'').trim();
  const startVal=document.getElementById('credit-start-date').value;
  const endVal=document.getElementById('credit-end-date').value;
  if(!name){toast('Nom complet requis','err');document.getElementById('credit-name').focus();return;}
  if(!startVal){toast('Date de début requise','err');return;}
  if(!endVal){toast('Date de fin requise','err');return;}

  const email=(document.getElementById('credit-email').value||'').trim()||null;
  const phone1=(document.getElementById('credit-phone1').value||'').trim()||null;
  const phone2=(document.getElementById('credit-phone2').value||'').trim()||null;
  const amount=parseFloat(document.getElementById('credit-amount').value)||null;
  const type=document.getElementById('credit-type').value||null;
  const activity=(document.getElementById('credit-activity').value||'').trim()||null;
  const address=(document.getElementById('credit-address').value||'').trim()||null;
  const excludeAuto=document.getElementById('credit-exclude-automation')?.checked||false;

  const btn=document.getElementById('cf-btn-save');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spin" style="width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite"></div> Enregistrement…';}

  try{
    // 1. Créer ou trouver le client
    let q=sb.from('clients').select('id').eq('full_name',name);
    if(phone1) q=q.eq('phone1',phone1);
    else q=q.is('phone1',null);
    const {data: existingClient} = await q.maybeSingle();

    let clientId = existingClient?.id;
    if(!clientId){
      const {data: newClient, error:cErr} = await sb.from('clients').insert([{
        full_name:name,email,phone1,phone2,activity,address,
        total_portefeuille:amount,health:'Sain',is_active:true,
        exclude_automation:excludeAuto
      }]).select('id').single();
      if(cErr) throw cErr;
      clientId = newClient.id;
    }else{
      await sb.from('clients').update({
        email,phone2,activity,address,total_portefeuille:amount,exclude_automation:excludeAuto
      }).eq('id',clientId);
    }

    // 2. Créer le crédit (pas de onConflict qui plante sur les nulls)
    const {data: credit, error:crErr} = await sb.from('credits').insert([{
      client_id:clientId,
      client_name:name,phone:phone1,email,activity,address,amount,type,
      status:'EN COURS',health:'SAIN',start_date:startVal,end_date:endVal,
      manager_id:currentUser?.id||null,
      exclude_automation:excludeAuto
    }]).select('id').single();
    if(crErr) throw crErr;

    // 3. Générer l'échéancier mensuel (même algo que PC)
    const start=new Date(startVal+'T12:00:00');
    const end=new Date(endVal+'T12:00:00');
    const targetDay=start.getDate();
    const startMonth=start.getMonth();
    const startYear=start.getFullYear();
    const repayments=[];
    let monthCount=1;
    while(true){
      let ref=new Date(startYear,startMonth+monthCount,targetDay);
      if(ref.getDate()!==targetDay)ref.setDate(0);
      if(ref>new Date(end.getTime()+15*24*60*60*1000))break;
      const adj=skipWeekendLocal(new Date(ref));
      repayments.push({credit_id:credit.id,installment_number:monthCount,
        scheduled_date:adj.toISOString().split('T')[0],amount:null,status:'En attente'});
      if(monthCount>=120||ref>=end)break;
      monthCount++;
    }
    if(repayments.length){
      const{error:rErr}=await sb.from('repayments').insert(repayments);
      if(rErr)throw rErr;
    }

    toast(`Dossier créé — ${repayments.length} échéances générées ✓`,'ok');
    closeModal();
    loadCredits();
  }catch(e){
    toast('Erreur : '+(e.message||'inconnue'),'err');
    if(btn){btn.disabled=false;btn.innerHTML='<span class="material-symbols-outlined filled" style="font-size:18px">save</span> Enregistrer le dossier';}
  }
}

let statusMapPWA = {};
let selectedProsPWA = new Set();


async function loadProspects(){
  const list=document.getElementById('pros-list');
  if(!list)return;
  list.innerHTML=`<div class="loader"><div class="spin"></div></div>`;
  try{
    if(Object.keys(statusMapPWA).length===0){
      const{data:stData}=await sb.from('prospect_statuses').select('label,color');
      (stData||[]).forEach(s=>statusMapPWA[s.label]=s.color);
    }
    let q=sb.from('prospects').select('*').order('created_at',{ascending:false});
    if(prosFilter!=='all')q=q.eq('status',prosFilter);
    if(prosActFilter)q=q.eq('activity',prosActFilter);
    if(prosDateFrom)q=q.gte('created_at',prosDateFrom);
    if(prosDateTo)q=q.lte('created_at',prosDateTo+'T23:59:59');
    const{data,error}=await q;
    if(error)throw error;
    let rows=data||[];
    if(prosSearch){const s=prosSearch.toLowerCase();rows=rows.filter(p=>(p.full_name||'').toLowerCase().includes(s)||(p.phone||'').includes(s));}
    if(!rows.length){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">person_search</span><p>Aucun prospect trouvé</p></div>`;return;}
    rows.forEach(p=>_prosCache[p.id]=p);
    
    let bulkHtml = '';
    if(selectedProsPWA.size > 0) {
      bulkHtml = `<div style="padding:0 16px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:#f87171;font-weight:700">${selectedProsPWA.size} sélectionné(s)</span>
        <button class="btn-ghost" style="color:#f87171;font-size:11px;padding:4px 8px" onclick="bulkDeleteProsPWA()">
          <span class="material-symbols-outlined" style="font-size:16px">delete_sweep</span> Supprimer
        </button>
      </div>`;
    }

    list.innerHTML=`
      <div style="padding:0 16px 8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:rgba(255,255,255,.4)">${rows.length} prospect${rows.length>1?'s':''}</span>
        <button class="btn-ghost" style="font-size:11px" onclick="toggleSelectAllProsPWA(${JSON.stringify(rows.map(r=>r.id)).replace(/"/g,'&quot;')})">Tout sélectionner</button>
      </div>
      ${bulkHtml}
      <div class="glass" style="margin:0 16px;overflow:hidden">
        ${rows.map(p=>prosRow(p)).join('')}
      </div>`;
  }catch(e){list.innerHTML=`<div class="empty"><span class="material-symbols-outlined">wifi_off</span><p>Erreur</p></div>`;}
}

async function loadProspectFullHistory(pid) {
  const hList = document.getElementById('detail-history-list');
  const nList = document.getElementById('detail-notes-list');
  
  try {
    // Charger Historique Com
    const { data: logs } = await sb.from('communication_logs')
      .select('*')
      .eq('prospect_id', pid)
      .order('created_at', { ascending: false })
      .limit(5);

    if (!logs || logs.length === 0) {
      hList.innerHTML = '<p style="text-align:center;color:var(--text3);font-size:12px;padding:20px 0">Aucun historique de communication</p>';
    } else {
      hList.innerHTML = `<div class="glass" style="overflow:hidden">` + logs.map(l => `
        <div style="padding:12px;border-bottom:1px solid var(--sep);display:flex;gap:10px;align-items:flex-start">
          <div style="width:30px;height:30px;border-radius:8px;background:${l.type==='WhatsApp'?'rgba(37,211,102,0.1)':'rgba(99,102,241,0.1)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span class="material-symbols-outlined" style="font-size:16px;color:${l.type==='WhatsApp'?'#25d366':'#818cf8'}">${l.type==='WhatsApp'?'chat':'call'}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:2px">
              <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">${l.type}</span>
              <span style="font-size:9px;color:var(--text3)">${fmtDate(l.created_at?.split('T')[0])}</span>
            </div>
            <p style="font-size:12px;color:var(--text);margin:0;line-height:1.4">${l.message_body || 'Communication effectuée'}</p>
          </div>
        </div>
      `).join('') + `</div>`;
    }

    // Charger Notes
    const { data: notes } = await sb.from('prospect_notes')
      .select('*')
      .eq('prospect_id', pid)
      .order('created_at', { ascending: false })
      .limit(3);

    if (!notes || notes.length === 0) {
      nList.innerHTML = '<p style="text-align:center;color:var(--text3);font-size:12px;padding:20px 0">Aucune note enregistrée</p>';
    } else {
      nList.innerHTML = notes.map(n => `
        <div class="glass-sm" style="padding:12px;margin-bottom:8px">
          <p style="font-size:13px;margin:0 0 6px;line-height:1.5;font-style:italic;color:var(--text)">"${n.content}"</p>
          <p style="font-size:10px;color:var(--text2);margin:0">${fmtDate(n.created_at?.split('T')[0])} · ${n.author_name || 'Admin'}</p>
        </div>
      `).join('');
    }
  } catch (e) {
    hList.innerHTML = nList.innerHTML = '<p style="padding:20px;font-size:12px;color:var(--text3)">Erreur de chargement des données</p>';
  }
}

function toggleSelectAllProsPWA(ids){
  if(selectedProsPWA.size === ids.length) selectedProsPWA.clear();
  else ids.forEach(id=>selectedProsPWA.add(id));
  loadProspects();
}

async function bulkDeleteProsPWA(){
  const ids = [...selectedProsPWA];
  if(!ids.length)return;
  openConfirm(`Supprimer ${ids.length} prospect(s) ?`,`Cette action supprimera également leurs notes.`,async ()=>{
    try {
      await sb.from('prospect_notes').delete().in('prospect_id', ids);
      const {error} = await sb.from('prospects').delete().in('id', ids);
      if(error) throw error;
      toast(`${ids.length} prospect(s) supprimé(s)`,'ok');
      selectedProsPWA.clear();
      loadProspects();
    } catch(e) { toast('Erreur lors de la suppression','err'); }
  });
}

  return map[c?.toLowerCase()]||c||'#cbd5e1';
}

async function saveProspect(id=null){
  const name=(document.getElementById('prospect-name').value||'').trim();
  if(!name){toast('Nom et Prénoms requis','err');document.getElementById('prospect-name').focus();return;}
  const payload={
    full_name:name,
    email:document.getElementById('prospect-email').value.trim()||null,
    phone:document.getElementById('prospect-phone').value.trim()||null,
    phone2:document.getElementById('prospect-phone2').value.trim()||null,
    address:document.getElementById('prospect-address').value.trim()||null,
    neighborhood:document.getElementById('prospect-address').value.trim()||null,
    activity:document.getElementById('prospect-activity').value.trim()||null,
    activity_detail:document.getElementById('prospect-activity-detail').value.trim()||null,
    status:document.getElementById('prospect-status').value,
    notes:document.getElementById('prospect-observations').value.trim()||null,
    exclude_automation:document.getElementById('prospect-exclude-automation')?.checked||false
  };
  try{
    let error;
    if(id){
      ({error}=await sb.from('prospects').update(payload).eq('id',id));
    }else{
      ({error}=await sb.from('prospects').upsert([payload],{onConflict:'full_name,phone'}));
    }
    if(error)throw error;
    toast(id?'Prospect mis à jour ✓':'Prospect ajouté ✓','ok');
    closeModal();
    loadProspects();
  }catch(e){toast('Erreur : '+e.message,'err');}
}

async function deleteProspect(id,name,fromForm=false){
  openConfirm(`Supprimer ${name} ?`,'Cette action est irréversible.',async()=>{
    try{
      const{error}=await sb.from('prospects').delete().eq('id',id);
      if(error)throw error;
      toast('Prospect supprimé','ok');
      closeModal();
      loadProspects();
    }catch(e){toast('Erreur suppression','err');}
  });
}

function changeCreditStatus(creditId, clientName, currentStatus){
  const isSolde=['Soldé','SOLDÉ','soldé'].includes(currentStatus);
  const isSouffrance=currentStatus==='Souffrance';
  openModal(`
    <div style="padding:0 20px 24px">
      <p class="sheet-title" style="padding:0 0 8px;margin-bottom:6px">${clientName}</p>
      <p style="font-size:12px;color:var(--text2);margin:0 0 20px">Statut actuel : <strong>${currentStatus||'—'}</strong></p>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${!isSolde&&isSouffrance?`
        <button class="btn-primary" style="background:linear-gradient(135deg,#10b981,#059669)" onclick="setCreditStatus('${creditId}','En cours','Sain')">
          <span class="material-symbols-outlined filled">check_circle</span> Remettre EN COURS
        </button>`:''}
        ${!isSouffrance?`
        <button class="btn-primary" style="background:linear-gradient(135deg,#f87171,#dc2626)" onclick="setCreditStatus('${creditId}','Souffrance','Souffrance')">
          <span class="material-symbols-outlined filled">warning</span> Marquer EN SOUFFRANCE
        </button>`:''}
        ${!isSolde?`
        <button class="btn-primary" style="background:linear-gradient(135deg,#60a5fa,#2563eb)" onclick="setCreditStatus('${creditId}','Soldé','Soldé')">
          <span class="material-symbols-outlined filled">task_alt</span> Marquer SOLDÉ (clôturer)
        </button>`:''}
        <button class="btn-ghost" onclick="closeModal()">Annuler</button>
      </div>
    </div>`);
}

async function setCreditStatus(creditId, status, health){
  const now=today();
  const creditUpdate={status, health};
  if(status==='Soldé') creditUpdate.end_date=now;

  const{error}=await sb.from('credits').update(creditUpdate).eq('id',creditId);
  if(error){toast('Erreur','err');return;}

  // Soldé → toutes les échéances impayées passent automatiquement à Payé
  if(status==='Soldé'){
    const{error:repErr}=await sb.from('repayments').update({
      is_paid:true,
      actual_payment_date:now,
      status:'Payé'
    }).eq('credit_id',creditId).eq('is_paid',false);
    if(repErr)console.error('Erreur màj échéances:',repErr);
    toast('Crédit soldé — toutes les échéances marquées payées ✓','ok');
  }else{
    toast(`Statut → ${status} ✓`,'ok');
  }
  closeModal();
  loadCredits();
}

async function toggleCreditHealth(id, current){
  const next = (current||'Sain').toLowerCase() === 'souffrance' ? 'Sain' : 'Souffrance';
  
  // Mise à jour optimiste (l'interface change instantanément)
  const c = credits.find(x => x.id === id);
  if (c) {
    c.health = next;
    viewCredits(credits); // Rafraîchit visuellement instantanément
    if(typeof currentCreditId !== 'undefined' && currentCreditId === id) openCreditDetail(id);
  }
  
  // Requête en arrière-plan
  const{error}=await sb.from('credits').update({health:next}).eq('id',id);
  if(error) {
    // En cas d'erreur on annule
    if(c){ 
       c.health = current; 
       viewCredits(credits); 
       if(typeof currentCreditId !== 'undefined' && currentCreditId === id) openCreditDetail(id);
    }
    toast('Erreur de mise à jour','err');
  } else {
    toast(`Santé → ${next}`,'ok');
    // Actualisation silencieuse en arrière plan pour resync globale si nécessaire
    loadCredits(); 
  }
}

async function toggleCreditStatus(id, current){
  const isS = (current||'En cours').toLowerCase() === 'soldé';
  const next = isS ? 'En cours' : 'Soldé';
  
  const c = credits.find(x => x.id === id);

  if(next === 'Soldé'){
     if(c) { 
        c.status = next; 
        viewCredits(credits); 
        if(typeof currentCreditId !== 'undefined' && currentCreditId === id) openCreditDetail(id);
     }
     await setCreditStatus(id, 'Soldé', _credCache[id]?.health || 'Sain');
  } else {
     if(c) { 
        c.status = next; c.end_date = null; 
        viewCredits(credits); 
        if(typeof currentCreditId !== 'undefined' && currentCreditId === id) openCreditDetail(id);
     }
     const{error}=await sb.from('credits').update({status:next, end_date:null}).eq('id',id);
     if(error) {
       if(c) { 
          c.status = current; 
          viewCredits(credits); 
          if(typeof currentCreditId !== 'undefined' && currentCreditId === id) openCreditDetail(id);
       }
       toast('Erreur de mise à jour','err');
     } else {
       toast(`Statut → ${next}`,'ok');
       loadCredits();
     }
  }
}

async function saveModel(id,isNew){
  const title=(document.getElementById('m-title').value||'').trim();
  const type=document.getElementById('m-type').value;
  const category=document.getElementById('m-cat').value;
  const body=(document.getElementById('m-body').value||'').trim();
  if(!title){toast('Titre requis','err');return;}
  if(!body){toast('Message requis','err');return;}
  const payload={title,type,category,body};
  let error;
  if(isNew){
    payload.active=false;
    ({error}=await sb.from('communication_models').insert(payload));
  }else{
    ({error}=await sb.from('communication_models').update(payload).eq('id',id));
  }
  if(error){toast('Erreur sauvegarde','err');return;}
  toast(isNew?'Modèle créé ✓':'Modèle mis à jour ✓','ok');
  closeModal();
  viewModels();
}

async function openCreditDetail(id) {
  if(!id){ toast('Crédit introuvable', 'err'); return; }
  let c = _credCache[id];
  if(!c){
    // Pas dans le cache (ex: ouvert depuis Remboursements) → fetch Supabase
    const{data,error}=await sb.from('credits')
      .select('id,client_id,amount,status,type,client_name,phone,email,activity,address,health,start_date,end_date,clients(id,full_name,phone1,phone2,email,activity,address)')
      .eq('id',id).single();
    if(error||!data){ toast('Crédit introuvable', 'err'); return; }
    // Compter les remboursements
    const{data:repsAll}=await sb.from('repayments').select('is_paid').eq('credit_id',id);
    const paid=(repsAll||[]).filter(r=>r.is_paid).length;
    data.reps={total:(repsAll||[]).length,paid};
    _credCache[id]=data;
    c=data;
  }
  currentCreditId = id;
  const content = document.getElementById('credit-detail-content');
  content.innerHTML = renderCreditDetail(c);
  document.getElementById('credit-detail-view').classList.add('open');
}

function renderCreditDetail(c) {
  const name = getName(c);
  // On récupère toutes les informations disponibles
  const phone1 = c.phone || c.clients?.phone1 || '';
  const phone2 = c.clients?.phone2 || '';
  const email = c.email || c.clients?.email || '';
  const activity = c.activity || c.clients?.activity || '';
  const address = c.address || c.clients?.address || '';
  const startD = c.start_date ? fmtDate(c.start_date.split('T')[0]) : '—';
  const endD = c.end_date ? fmtDate(c.end_date.split('T')[0]) : '—';

  const isS = c.health === 'Souffrance';
  const pct = c.reps.total > 0 ? Math.round(c.reps.paid / c.reps.total * 100) : 0;
  
  // Affiche TOUS les champs "sans exception" (même vides = "Non renseigné")
  const infoRow = (icon, label, value, color='#f27f0d') => `
    <div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--sep)">
      <div style="width:36px;height:36px;border-radius:10px;background:${color}18;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span class="material-symbols-outlined filled" style="font-size:18px;color:${color}">${icon}</span>
      </div>
      <div style="flex:1;min-width:0">
        <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:0 0 2px">${label}</p>
        <p style="font-size:14px;font-weight:600;color:${value?'var(--text)':'var(--text3)'};margin:0;font-style:${value?'normal':'italic'}">${value||'Non renseigné'}</p>
      </div>
    </div>`;

  return `
    <!-- HERO -->
    <div style="background:linear-gradient(160deg,rgba(16,185,129,.12) 0%,rgba(242,127,13,.07) 100%);border-radius:20px;padding:28px 20px 22px;margin-bottom:16px;text-align:center;border:1px solid rgba(255,255,255,.06)">
      <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,rgba(16,185,129,.4),rgba(16,185,129,.15));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin:0 auto 14px;box-shadow:0 8px 24px rgba(16,185,129,.25)">${initials(name)}</div>
      <h2 style="font-size:22px;font-weight:800;margin:0 0 8px;color:var(--text);letter-spacing:-.3px">${name}</h2>
      
      <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <!-- Badge ÉTAT — clic bascule Sain↔Souffrance -->
        <button onclick="toggleCreditHealth('${c.id}','${c.health||'Sain'}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid ${isS?'rgba(239,68,68,.4)':'rgba(34,197,94,.4)'};background:${isS?'rgba(239,68,68,.12)':'rgba(34,197,94,.12)'};cursor:pointer;transition:all .15s">
          <span class="material-symbols-outlined filled" style="font-size:13px;color:${isS?'#f87171':'#4ade80'}">${isS?'warning':'check_circle'}</span>
          <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:${isS?'#f87171':'#4ade80'}">${c.health||'Sain'}</span>
          <span style="font-size:10px;color:${isS?'#f87171':'#4ade80'};opacity:.7">↻</span>
        </button>
        <!-- Badge STATUT — clic ouvre modal de changement -->
        ${(()=>{
          const st=c.status||'En cours';
          const isSolde=['Soldé','SOLDÉ','soldé'].includes(st);
          const isEchu=st==='Échu';
          const isSouft=st==='Souffrance';
          const col=isSolde?'#4ade80':isEchu||isSouft?'#f87171':'#60a5fa';
          const bg=isSolde?'rgba(34,197,94,.12)':isEchu||isSouft?'rgba(239,68,68,.12)':'rgba(96,165,250,.12)';
          const border=isSolde?'rgba(34,197,94,.4)':isEchu||isSouft?'rgba(239,68,68,.4)':'rgba(96,165,250,.4)';
          const ico=isSolde?'task_alt':isEchu||isSouft?'error':'sync';
          return `<button onclick="changeCreditStatus('${c.id}','${name.replace(/'/g,"\\'")}','${st}')" style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid ${border};background:${bg};cursor:pointer;transition:all .15s">
            <span class="material-symbols-outlined filled" style="font-size:13px;color:${col}">${ico}</span>
            <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:${col}">${st}</span>
            <span style="font-size:10px;color:${col};opacity:.7">▾</span>
          </button>`;
        })()}
      </div>

      <p style="font-size:28px;font-weight:900;color:#f27f0d;margin:10px 0 0;line-height:1">${fmt(c.amount)} <span style="font-size:14px;color:var(--text3)">FCFA</span></p>
      ${c.type ? `<p style="font-size:13px;color:var(--text2);margin:6px 0 0;font-weight:500">${c.type}</p>` : ''}

      <!-- Actions compactes -->
      <div style="display:flex;justify-content:center;gap:8px;margin-top:20px;flex-wrap:wrap">
        <button onclick="viewEcheancier('${c.id}', '${name.replace(/'/g,"\\'")}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:14px;background:rgba(242,127,13,.1);border:1px solid rgba(242,127,13,.25);cursor:pointer;min-width:62px">
          <span class="material-symbols-outlined" style="font-size:20px;color:#f27f0d">list_alt</span>
          <span style="font-size:10px;font-weight:700;color:#f27f0d">Échéancier</span>
        </button>
        ${phone1 ? `
        <button onclick="call('${phone1}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:14px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);cursor:pointer;min-width:62px">
          <span class="material-symbols-outlined" style="font-size:20px;color:#818cf8">call</span>
          <span style="font-size:10px;font-weight:700;color:#818cf8">Appeler</span>
        </button>
        <button onclick="wa('${phone1}','${name.replace(/'/g,"\\'")}','Relance Crédit',${c.amount},'${c.status||''}','','${c.id}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:14px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);cursor:pointer;min-width:62px">
          <span class="material-symbols-outlined" style="font-size:20px;color:#25d366">chat</span>
          <span style="font-size:10px;font-weight:700;color:#25d366">WhatsApp</span>
        </button>` : ''}
      </div>
    </div>

    <!-- INFOS -->
    <div class="detail-card" style="margin-bottom:16px;padding:6px 16px 4px">
      <!-- Coordonnées -->
      <div style="display:flex;align-items:center;gap:7px;padding:10px 0 8px;border-bottom:1px solid var(--sep)">
        <span class="material-symbols-outlined" style="font-size:15px;color:var(--text3)">person</span>
        <span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Coordonnées Client</span>
      </div>
      ${infoRow('call','Téléphone 1', phone1, '#818cf8')}
      ${infoRow('phone','Téléphone 2', phone2, '#818cf8')}
      ${infoRow('mail','Email', email, '#f43f5e')}
      ${infoRow('location_on','Adresse', address, '#10b981')}
      ${infoRow('storefront','Secteur d\'activité', activity, '#10b981')}

      <!-- Détails Financiers -->
      <div style="display:flex;align-items:center;gap:7px;padding:24px 0 8px;border-bottom:1px solid var(--sep)">
        <span class="material-symbols-outlined" style="font-size:15px;color:var(--text3)">account_balance</span>
        <span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Détails Financiers</span>
      </div>
      ${infoRow('event_available','Date de début', startD, '#f27f0d')}
      ${infoRow('event_upcoming','Date de fin (Échéance)', endD, '#f27f0d')}
      
      <div style="padding:14px 0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <p style="font-size:12px;font-weight:700;color:var(--text);margin:0">Progression globale</p>
          <p style="font-size:12px;font-weight:700;color:var(--text2);margin:0">${c.reps.paid}/${c.reps.total}</p>
        </div>
        <div class="progress-bar-bg" style="height:8px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
}


// ─── LOGOUT ───────────────────────────────────
function confirmLogout(){
  openConfirm('Se déconnecter ?','Vous serez redirigé vers la page de connexion.',async()=>{
    sessionStorage.removeItem('portefin_session');
    await sb.auth.signOut().catch(()=>{});
    window.location.replace('/mobile/login');
  });
}

// Service Worker
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
