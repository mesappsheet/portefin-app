<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>PorteFin — Connexion</title>
<meta name="theme-color" content="#0c1425"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="./manifest.json"/>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;margin:0;min-height:100vh;min-height:100dvh;
  background:#0c1425;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:20px;overflow:hidden;position:relative}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.filled{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:320px;height:320px;background:radial-gradient(circle,rgba(242,127,13,.2),transparent 70%);top:-100px;right:-80px;animation:orbF 8s ease-in-out infinite}
.orb2{width:260px;height:260px;background:radial-gradient(circle,rgba(23,99,207,.15),transparent 70%);bottom:-60px;left:-60px;animation:orbF 11s ease-in-out infinite reverse}
@keyframes orbF{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,18px)}}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px 28px;width:100%;max-width:400px;position:relative;z-index:10;animation:slideUp .5s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#f27f0d,#c96a00);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1px rgba(242,127,13,.4),0 8px 30px rgba(242,127,13,.3);margin:0 auto 18px}

.fw{position:relative;margin-bottom:14px}
.fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);font-size:20px;pointer-events:none}
.inp{width:100%;padding:14px 14px 14px 46px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;color:white;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;-webkit-appearance:none}
.inp::placeholder{color:rgba(255,255,255,.3)}
.inp:focus{border-color:#f27f0d;background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(242,127,13,.15)}
.tpw{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);cursor:pointer;font-size:20px}
.ferr{color:#f87171;font-size:12px;margin-top:4px;display:none;padding-left:4px}
.ferr.show{display:block}

.btn{width:100%;padding:15px;background:linear-gradient(135deg,#f27f0d,#c96a00);border:none;border-radius:12px;color:white;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(242,127,13,.4);display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover:not(:disabled){box-shadow:0 6px 28px rgba(242,127,13,.55);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:999;display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;color:white;min-width:260px;max-width:90vw;transition:all .3s;opacity:0;pointer-events:none;backdrop-filter:blur(16px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{background:rgba(239,68,68,.9);border:1px solid rgba(239,68,68,.5)}
#toast.success{background:rgba(34,197,94,.9);border:1px solid rgba(34,197,94,.5)}
</style>
</head>
<body>
<div class="grid-lines"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div id="toast">
  <span id="t-icon" class="material-symbols-outlined filled" style="font-size:18px"></span>
  <span id="t-msg"></span>
</div>

<div style="width:100%;max-width:420px;position:relative;z-index:10;padding:0 4px">
<div class="card">

  <div style="text-align:center;margin-bottom:28px">
    <div class="logo">
      <span class="material-symbols-outlined filled" style="color:white;font-size:28px">account_balance_wallet</span>
    </div>
    <h1 style="color:white;font-weight:800;font-size:22px;margin:0 0 4px">PorteFin</h1>
    <p style="color:rgba(255,255,255,.4);font-size:12px;margin:0;letter-spacing:.08em;text-transform:uppercase">Terrain · Mobile</p>
  </div>

  <div style="margin-bottom:22px">
    <h2 style="color:white;font-weight:700;font-size:17px;margin:0 0 4px">Connexion</h2>
    <p style="color:rgba(255,255,255,.4);font-size:13px;margin:0">Accédez à votre espace sécurisé</p>
  </div>

  <div class="fw">
    <span class="material-symbols-outlined fi">mail</span>
    <input id="inp-email" class="inp" type="text" placeholder="Identifiant ou e-mail"
      autocomplete="username" autocapitalize="none"
      onkeydown="if(event.key==='Enter')document.getElementById('inp-pw').focus()"/>
    <div id="err-email" class="ferr">E-mail invalide</div>
  </div>

  <div class="fw">
    <span class="material-symbols-outlined fi">lock</span>
    <input id="inp-pw" class="inp" type="password" placeholder="Mot de passe"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:46px"/>
    <span class="material-symbols-outlined tpw" id="tpw-icon" onclick="togglePw()">visibility</span>
    <div id="err-pw" class="ferr">Mot de passe requis</div>
  </div>

  <button id="btn-login" class="btn" onclick="doLogin()">
    <span class="material-symbols-outlined filled" style="font-size:18px">login</span>
    Se connecter
  </button>

  <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px">
    <span class="material-symbols-outlined" style="color:rgba(255,255,255,.2);font-size:14px">shield</span>
    <p style="color:rgba(255,255,255,.2);font-size:11px;margin:0">Connexion chiffrée · Données sécurisées</p>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://lkuwgggwdtbzjgplwylr.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrdXdnZ2d3ZHRiempncGx3eWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDgxMDQsImV4cCI6MjA4OTA4NDEwNH0.YPqCCqhhVvu9iJXqwUP57A-u8mBFf4nARtSyGmCxfgo";
const sb=window.supabase.createClient(SB_URL,SB_KEY);

// Détecte si on est servi depuis /maquette-app/ (accès IP) ou depuis la racine (sous-domaine)
function _mobileHome(){
  if(location.pathname.startsWith('/maquette-app'))return '/maquette-app/';
  if(location.hostname==='localhost'||location.hostname==='127.0.0.1')return '/index.html';
  return '/mobile';
}

(async()=>{
  try{
    if(sessionStorage.getItem('portefin_session'))return window.location.replace(_mobileHome());
    const{data:{session}}=await sb.auth.getSession();
    if(session)window.location.replace(_mobileHome());
  }catch(e){}
})();

let pwv=false;
function togglePw(){
  pwv=!pwv;
  document.getElementById('inp-pw').type=pwv?'text':'password';
  document.getElementById('tpw-icon').textContent=pwv?'visibility_off':'visibility';
}

let _tt;
function toast(msg,type='error'){
  const t=document.getElementById('toast');
  document.getElementById('t-msg').textContent=msg;
  document.getElementById('t-icon').textContent=type==='success'?'check_circle':'error';
  t.className=`show ${type}`;
  clearTimeout(_tt);_tt=setTimeout(()=>{t.className='';},3500);
}

const ADMIN_ID='Administrateur';
const ADMIN_PASS='Codjo@1989';

async function doLogin(){
  const id=document.getElementById('inp-email').value.trim();
  const pw=document.getElementById('inp-pw').value;
  document.getElementById('err-email').classList.remove('show');
  document.getElementById('err-pw').classList.remove('show');
  let ok=true;
  if(!id){document.getElementById('err-email').classList.add('show');ok=false;}
  if(!pw){document.getElementById('err-pw').classList.add('show');ok=false;}
  if(!ok)return;

  const btn=document.getElementById('btn-login');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> Connexion…';

  // Bypass admin (même identifiant que le SaaS PC)
  if(id===ADMIN_ID){
    if(pw!==ADMIN_PASS){
      btn.disabled=false;
      btn.innerHTML='<span class="material-symbols-outlined filled" style="font-size:18px">login</span> Se connecter';
      toast('Mot de passe administrateur incorrect');
      return;
    }
    sessionStorage.setItem('portefin_session',JSON.stringify({name:'Administrateur',email:'admin@portefin.app',role:'Administrateur',id:'admin'}));
    toast('Bienvenue, Administrateur !','success');
    setTimeout(()=>window.location.replace(_mobileHome()),600);
    return;
  }

  // Connexion Supabase standard
  try{
    const{data,error}=await sb.auth.signInWithPassword({email:id,password:pw});
    if(error)throw error;
    const user=data.user;
    const name=user.user_metadata?.full_name||user.email.split('@')[0];
    sessionStorage.setItem('portefin_session',JSON.stringify({name,email:user.email,role:'Utilisateur',id:user.id}));
    toast('Connexion réussie !','success');
    setTimeout(()=>window.location.replace(_mobileHome()),600);
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='<span class="material-symbols-outlined filled" style="font-size:18px">login</span> Se connecter';
    const m=e.message||'';
    if(m.includes('Invalid login'))toast('Email ou mot de passe incorrect');
    else if(m.includes('Email not confirmed'))toast('Confirmez votre e-mail d\'abord');
    else toast('Erreur de connexion. Réessayez.');
  }
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
