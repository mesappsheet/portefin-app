<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d6cf2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Nouveau Prospect - Gestion du Portefeuille</title>
</head>
<body class="bg-slate-200/50 dark:bg-slate-950 font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
<!-- Modal Container -->
<div class="bg-white dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
<!-- Header -->
<div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">person_add</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Nouveau Prospect</h1>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-6 space-y-8">
<!-- Section 1: Informations du Prospect -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-4">
<span class="text-primary font-semibold text-xs uppercase tracking-wider">Étape 1</span>
<h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Informations Générales</h2>
</div>
<div class="grid grid-cols-1 gap-6">
<!-- Nom et Prénoms -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Nom et Prénoms <span class="text-red-500">*</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="Ex: Jean Dupont" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date de création -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Date de création</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" type="date"/>
</div>
</div>
<!-- Téléphone -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Téléphone <span class="text-red-500">*</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">call</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="+225 00 00 00 00 00" type="tel"/>
</div>
</div>
</div>
<!-- Adresse activité -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Adresse activité</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">location_on</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="Localisation précise de l'activité" type="text"/>
</div>
</div>
</div>
</section>
<!-- Section 2: Qualification -->
<section class="bg-primary/5 dark:bg-primary/10 p-6 rounded-xl border border-primary/10 space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="text-primary font-semibold text-xs uppercase tracking-wider">Étape 2</span>
<h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Qualification</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Activité -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Activité</label>
<select class="w-full px-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none appearance-none">
<option value="">Sélectionner une activité</option>
<option value="commerce">Commerce</option>
<option value="service">Services</option>
<option value="industrie">Industrie</option>
</select>
</div>
<!-- Statut -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Statut</label>
<select class="w-full px-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none appearance-none">
<option value="nouveau">Nouveau</option>
<option value="en_cours">En cours de qualification</option>
<option value="prioritaire">Prioritaire</option>
</select>
</div>
</div>
<!-- Avis / Observations -->
<div class="flex flex-col gap-1.5 pt-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Avis / Observations</label>
<textarea class="w-full px-4 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none resize-none" placeholder="Saisissez vos notes ou remarques particulières ici..." rows="4"></textarea>
</div>
</section>
</div>
<!-- Footer -->
<div class="p-6 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-3 bg-slate-50/50 dark:bg-slate-900/30">
<button class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Annuler
                </button>
<button class="bg-primary hover:bg-primary/90 text-white px-8 py-2.5 rounded-lg font-semibold shadow-lg shadow-primary/20 flex items-center gap-2 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">save</span>
                    Enregistrer le prospect
                </button>
</div>
</div>
</div>
</body></html>
