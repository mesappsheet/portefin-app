[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/maquette-app/login.html"
  status = 302

[[redirects]]
  from = "/app"
  to = "/maquette-app/index.html"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
