[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/MAQUETTE_COMPLETE.html"
  status = 200

# PWA Mobile
[[redirects]]
  from = "/mobile"
  to = "/maquette-app/index.html"
  status = 200

[[redirects]]
  from = "/mobile/login"
  to = "/maquette-app/login.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Service Worker - no cache to ensure updates
[[headers]]
  for = "/maquette-app/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest
[[headers]]
  for = "/maquette-app/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

